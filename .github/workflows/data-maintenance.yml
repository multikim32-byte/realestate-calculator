name: 격주 데이터 유지보수

on:
  schedule:
    - cron: '0 18 1,15 * *'  # 매월 1일·15일 03:00 KST
  workflow_dispatch:           # 수동 실행 가능

jobs:
  # ── 신규 아파트 단지 등록 ────────────────────────────────────────────────────
  collect-new-complexes:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 신규 아파트 단지 수집 (전국)
        run: node scripts/collect-complexes.mjs
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 신규 단지 주변환경 보강 (교통/학교/인프라) ──────────────────────────────
  enrich-new-complex-env:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: collect-new-complexes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 교통/학교/인프라 보강 (nearby_transit IS NULL 단지만)
        run: node scripts/enrich-complexes.mjs
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 신규 단지 청약홈 주택형 보강 ───────────────────────────────────────────
  enrich-cheongak-unit-types:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: enrich-new-complex-env
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 청약홈 공식 주택형·공급면적 보강 (built_year 2022+)
        run: node scripts/enrich-cheongak.mjs --year=2022
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 데이터 품질 점검 ─────────────────────────────────────────────────────────
  check-data-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: enrich-cheongak-unit-types
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: Supabase URL 및 데이터 품질 점검
        run: node scripts/check-supabase-urls.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── MOLIT 실거래 기반 신규 단지 등록 ──────────────────────────────────────────
  build-molit-complexes:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: check-data-quality
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: MOLIT 실거래 기반 신규 단지 등록 (apt_trades → apartment_complexes)
        run: node scripts/build-molit-complexes.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

  # ── unit_types 보강 (apt_trades 기준 + K-apt 코드 보강) ──────────────────────
  enrich-unit-types:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build-molit-complexes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: unit_types 보강 (미보강 단지만)
        run: node scripts/enrich-unit-types.mjs
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 분양권 단지 청약홈 보강 (공급면적·입주예정·당첨발표·세대수)
        run: node scripts/enrich-cheongak.mjs --presale
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 중복 단지 정리 (띄어쓰기 변형으로 분리된 잉여 단지 deprecated) ────────────
  dedup-complexes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: enrich-unit-types
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 중복 단지 정리 (M-prefix·unit_types 없는 잉여만 자동)
        run: node scripts/detect-dup-complexes.mjs --confirm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 분양 블록명 중복 정리 (분양명↔입주명 별도 등록 단지)
        run: node scripts/detect-presale-block-dup.mjs --confirm
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

