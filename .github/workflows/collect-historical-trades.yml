name: MOLIT 실거래 과거 데이터 수집

on:
  schedule:
    - cron: '10 15 * * *'  # 매일 00:10 KST
  workflow_dispatch:
    inputs:
      from:
        description: '시작 연월 (예: 201601) — 비워두면 자동 감지'
        required: false
      to:
        description: '종료 연월 (예: 201812) — 비워두면 자동 감지'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 수집 기간 결정
        id: period
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # 수동 입력이 있으면 그대로 사용
          if [ -n "${{ github.event.inputs.from }}" ] && [ -n "${{ github.event.inputs.to }}" ]; then
            echo "from=${{ github.event.inputs.from }}" >> $GITHUB_OUTPUT
            echo "to=${{ github.event.inputs.to }}"   >> $GITHUB_OUTPUT
            echo "skip=false"                          >> $GITHUB_OUTPUT
            echo "수동 입력: ${{ github.event.inputs.from }} ~ ${{ github.event.inputs.to }}"
            exit 0
          fi

          # 자동 감지: T/J 누락 구간 탐색
          RANGE=$(node scripts/get-collection-range.mjs)
          echo "gap-check 결과: $RANGE"

          SKIP=$(echo "$RANGE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('skip') else 'false')")
          if [ "$SKIP" = "true" ]; then
            echo "✅ 2014년 이후 T/J 데이터 전부 수집 완료 — 종료"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          FROM=$(echo "$RANGE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['from'])")
          TO=$(echo   "$RANGE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['to'])")
          echo "수집 기간: $FROM ~ $TO"
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "to=$TO"     >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: MOLIT 실거래 수집 (매매+전세)
        if: steps.period.outputs.skip != 'true'
        run: |
          node scripts/collect-apt-trades.mjs \
            --from=${{ steps.period.outputs.from }} \
            --to=${{ steps.period.outputs.to }} \
            --type=T,J
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
