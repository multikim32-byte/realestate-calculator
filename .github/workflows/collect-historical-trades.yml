name: MOLIT 실거래 과거 데이터 수집

on:
  workflow_dispatch:
    inputs:
      from:
        description: '시작 연월 (예: 201401)'
        required: true
        default: '201401'
      to:
        description: '종료 연월 (예: 201512)'
        required: true
        default: '201512'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci --ignore-scripts

      - name: MOLIT 실거래 수집 (${{ github.event.inputs.from }}~${{ github.event.inputs.to }}, 매매+전세)
        run: |
          node scripts/collect-apt-trades.mjs \
            --from=${{ github.event.inputs.from }} \
            --to=${{ github.event.inputs.to }} \
            --type=T,J
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
