name: jibun 백필 + MOLIT 단지 구축

on:
  workflow_dispatch:         # 수동 실행
  schedule:
    - cron: '5 15 * * *'    # KST 00:05 자동 실행 (1회 후 자동 제거)

jobs:
  backfill-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 180     # jibun 백필 최대 3시간

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      # ── Step 1: jibun 미보강 행 수 확인 ────────────────────────────────────
      - name: jibun 현황 확인
        run: |
          node --input-type=module <<'EOF'
          import { createClient } from '@supabase/supabase-js';
          const db = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
          const { count: total } = await db.from('apt_trades').select('*', { count: 'exact', head: true });
          const { count: has } = await db.from('apt_trades').select('*', { count: 'exact', head: true }).not('jibun', 'is', null);
          console.log(`jibun 현황: ${has?.toLocaleString()} / ${total?.toLocaleString()} (${Math.round(has/total*100)}%)`);
          EOF
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Step 2: 2년치 jibun 백필 ────────────────────────────────────────────
      - name: jibun 백필 (2024.06~2026.05 전체 재수집)
        run: node scripts/collect-apt-trades.mjs --from=202406 --to=202605 --overwrite --type=T,J,W
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Step 3: MOLIT 기반 단지 목록 구축 + 카카오 좌표 ────────────────────
      - name: MOLIT 단지 구축 (K-apt 매칭 + 신규 삽입)
        run: node scripts/build-molit-complexes.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}

      # ── Step 4: avg_price 재계산 ────────────────────────────────────────────
      - name: 단지 실거래가 보강 (신규 단지 포함 전체 재계산)
        run: node scripts/enrich-prices.mjs --force
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Step 5: cron 자동 제거 (schedule 트리거일 때만) ────────────────────
      - name: cron 자동 제거
        if: github.event_name == 'schedule'
        run: |
          sed -i 's/  schedule:/  # schedule:/' .github/workflows/jibun-backfill.yml
          sed -i 's/    - cron:/    # - cron:/' .github/workflows/jibun-backfill.yml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .github/workflows/jibun-backfill.yml
          git diff --staged --quiet || git commit -m "chore: jibun backfill cron 1회 실행 완료 → 자동 제거"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 6: 최종 현황 출력 ──────────────────────────────────────────────
      - name: 완료 현황 확인
        run: |
          node --input-type=module <<'EOF'
          import { createClient } from '@supabase/supabase-js';
          const db = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
          const { count: jibun } = await db.from('apt_trades').select('*', { count: 'exact', head: true }).not('jibun', 'is', null);
          const { count: total } = await db.from('apt_trades').select('*', { count: 'exact', head: true });
          const { count: enriched } = await db.from('apartment_complexes').select('*', { count: 'exact', head: true }).not('avg_price', 'is', null);
          const { count: molit } = await db.from('apartment_complexes').select('*', { count: 'exact', head: true }).eq('source', 'molit');
          const { count: complexTotal } = await db.from('apartment_complexes').select('*', { count: 'exact', head: true });
          console.log('✅ jibun:', jibun?.toLocaleString(), '/', total?.toLocaleString(), `(${Math.round(jibun/total*100)}%)`);
          console.log('✅ avg_price:', enriched?.toLocaleString(), '/', complexTotal?.toLocaleString());
          console.log('✅ MOLIT 신규 단지:', molit?.toLocaleString(), '개');
          EOF
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
