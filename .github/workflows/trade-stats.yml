name: 전국 실거래 통계 집계

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 03:00 KST
    - cron: '0 18 * * 1'  # 매주 월요일 03:00 KST — 단지 가격·카드 갱신
  workflow_dispatch:

jobs:
  # ── 매일: T/J/N 최근 2개월 수집 ─────────────────────────────────────────────
  collect-daily-trades:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 매매·전세·월세 최근 2개월 수집
        run: node scripts/collect-apt-trades.mjs --type=T,J,W --months=2
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 분양권·입주권 최근 2개월 수집
        run: node scripts/collect-apt-trades.mjs --type=N --months=2
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 매일: 월간 통계 집계 ─────────────────────────────────────────────────────
  aggregate-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: collect-daily-trades
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 월간 통계 집계
        run: node scripts/aggregate-trade-stats.mjs
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 매주 월요일: 주간 통계 집계 ───────────────────────────────────────────────
  aggregate-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '* * 1')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 주간 통계 집계
        run: node scripts/aggregate-weekly-trade-stats.mjs
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 매주 월요일: 단지 실거래 평균가 갱신 ─────────────────────────────────────
  enrich-complex-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '* * 1')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 단지 실거래 평균가 갱신
        run: node scripts/enrich-prices.mjs --force
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── 매주 월요일: 지역 통계·단지 보강·인스타카드 ──────────────────────────────
  weekly-data-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '* * 1')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --ignore-scripts

      - name: 지역 월간 거래 최신화
        run: |
          CURRENT=$(date -d "$(date +%Y-%m-01)" "+%Y%m")
          PREV=$(date -d "$(date +%Y-%m-01) -1 month" "+%Y%m")
          node scripts/collect-district-monthly.mjs --from=$PREV --to=$CURRENT --force
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 신규 단지 기본정보 보강
        run: node scripts/enrich-apt-basis.mjs
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 신규 단지 평형 보강
        run: node scripts/enrich-unit-types.mjs
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 주간 실거래 인스타카드 생성
        run: node scripts/generate-cards.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
